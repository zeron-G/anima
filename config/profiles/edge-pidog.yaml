runtime:
  profile: "edge-pidog"
  role: "edge_embodied"
  platform: "linux"
  embodiment: "robot_dog"
  labels: ["edge", "pidog", "embodied"]
  compute_tier: 3
  max_concurrent: 2
  require_llm_credentials: false

deploy:
  mode: "edge"
  install_dir: "~/.anima-edge"
  install_service: true
  python_cmd: "python3"

governance:
  default_mode: "cautious"

channels:
  discord:
    enabled: false
    token: ""
    allowed_users: []
  telegram:
    enabled: false
    token: ""
    allowed_users: []
  webhook:
    enabled: false
    port: 9421
    secret: ""

voice_bridge:
  enabled: false

robotics:
  enabled: true
  poll_interval_s: 1.5
  # ANIMA-side safety clamp (E1): pre-dispatch gate on ground-locomotion commands
  # (walk/turn/trot) — a secondary net; the authoritative real-time reflexes live in
  # the on-chip :8888 firmware. Safe verbs (stop/sit/emergency_stop/…) are never gated.
  safety:
    enabled: true
    tilt_limit_deg: 60.0            # |pitch| or |roll| above this blocks locomotion
    critical_battery_v: 6.0         # below this blocks locomotion (0.0 = unwired → ignored)
    forward_block_distance_cm: 15.0 # hard forward-collision block (obstacle_near also blocks)
  nlp_supervisor:
    enabled: false
    model: "codex/gpt-5.3-codex"
    max_tokens: 480
    min_confidence: 0.55
  nodes:
    - id: "pidog-local"
      name: "PiDog Edge"
      kind: "pidog"
      role: "robot_dog"
      base_urls:
        - "http://127.0.0.1:8888"
      tags: ["edge", "local", "robot_dog"]
      metadata:
        platform: "linux"
        locality: "onboard"
        anima_mode: "edge"
      exploration:
        move_burst_s: 1.0
        turn_burst_s: 0.8
        avoid_distance_cm: 28.0
