# ═══════════════════════════════════════
# ANIMA Default Configuration
# ═══════════════════════════════════════
#
# Project defaults only. No machine-specific values.
# Machine-specific settings go in local/env.yaml (gitignored).
# Secrets go in .env (gitignored).

agent:
  name: "eva"

runtime:
  profile: "default"
  role: "desktop_supervisor"
  platform: "desktop"
  embodiment: "virtual"
  labels: []
  compute_tier: 2
  max_concurrent: 5
  require_llm_credentials: true

edge:
  default_profile: "edge-pidog"
  service_name: "anima-edge"
  install_dir: "~/.anima-edge"
  auto_install_service: true

# ── Heartbeat ──
heartbeat:
  script_interval_s: 30
  llm_interval_s: 600        # 10 min base — fewer, DEEPER autonomous thoughts (S4).
                             # Emotion paces it (curious→shorter, deflated→longer) and
                             # repeated low-value "quiet" thinking backs off further.
  major_interval_s: 1800     # 30 min — evolution / major checks

llm_trigger:
  min_significant_diffs: 3   # trigger on fewer changes (was 5)
  significance_threshold: 0.3 # lower bar to trigger thinking (was 0.5)
  max_consecutive_skips: 5   # force thinking sooner (was 10)

# ── Perception ──
diff_rules:
  cpu_percent: { threshold: 15 }
  memory_percent: { threshold: 10 }
  disk_percent: { threshold: 5 }
  file_changes: { threshold: 0 }
  process_count: { threshold: 5 }

perception:
  watch_paths: ["."]
  watch_extensions: [".py", ".md", ".yaml", ".yml", ".json", ".txt"]
  snapshot_history_size: 10

# ── LLM ──
llm:
  tier1: { model: "claude-opus-4-8", max_tokens: 16384, max_context: 200000 }
  tier2: { model: "claude-sonnet-4-6", max_tokens: 16384, max_context: 200000 }
  # Model prefix routing:
  #   "codex/..."           → Codex OAuth (ChatGPT subscription, free)
  #   "claude-opus-4-8"     → Anthropic API (OAuth/API key)
  #   "deepseek/..."        → DeepSeek API (OpenAI-compatible; key via DEEPSEEK_API_KEY in .env)
  #   "local/"              → local server (llama.cpp/ollama/vLLM)
  #   "openai/gpt-4o"       → OpenAI cloud API
  # Hot-switch: POST /api/config {"key":"llm.tier1.model","value":"local/"}
  # Fallback cascade: codex → deepseek → claude(if key) → openai → local
  codex_fallback: { model: "", max_tokens: 16384 }
  deepseek_fallback: { model: "", max_tokens: 8192 }   # set model in local/env.yaml; key in .env
  openai_fallback: { model: "", max_tokens: 16384 }
  local: { model: "local/", base_url: "http://localhost:8080", max_tokens: 4096, max_context: 32768 }
  budget: { daily_limit_usd: 0 }

decision:
  low_threshold: 0.3
  high_threshold: 0.7

# ── Memory ──
# Backend is Postgres + pgvector (Neon primary + local failover). Connection
# strings live in .env: DATABASE_URL (primary) + LOCAL_DATABASE_URL (failover).
memory:
  working_capacity: 20
  summary_interval: 20      # Compress conversation every N messages
  keep_recent: 10            # Keep last N raw messages after compression
  sync_interval_s: 300       # Replica sync cadence: warm local while online; replay local→primary on reconnect

# ── Guardian / Sentinel (self-healing supervisor) ──
# Detect + surface + (P2) safe reversible auto-repair. Per-component `mode`:
# auto = execute; manual = propose + await human. enabled:false = observe-only
# (used for components with no fixer yet). See docs/SENTINEL_DESIGN.md.
guardian:
  enabled: true
  interval_s: 5             # health poll cadence
  probe_timeout_s: 3        # per-probe timeout (a hung probe never blocks the loop)
  repair_timeout_s: 45      # per-repair timeout (runs as a background task)
  # P4: cross-process restart budget (SHARED with the external limb). After `max`
  # restarts in `window_s`, the component goes DEFEATED (persisted) → stop trying,
  # page a human. This is the hard backstop against a restart storm.
  restart_budget: { max: 3, window_s: 3600 }
  components:
    # Safe, reversible auto-repair (P2). Flip mode→manual for human authorization.
    llm: { mode: auto, warn_threshold: 3, cooldown_s: 30, max_attempts: 3 }
    db:  { mode: auto, warn_threshold: 2, cooldown_s: 60, max_attempts: 5 }
    # P4: a crashed background loop (e.g. cognitive) has no safe in-process fix →
    # escalate to a graceful process restart (budget-gated). Set escalate_to_restart
    # false to only alert. Restart can't fix a down DB, so db does NOT escalate.
    task:     { enabled: true, warn_threshold: 3, cooldown_s: 30, escalate_to_restart: true }
    mesh:     { enabled: false }
    channels: { enabled: false }
    resource: { enabled: false }

# ── Evolution ──
evolution:
  # Push/pull evolution commits to/from `origin` (multi-node code propagation).
  # Off by default: evolution stays LOCAL (commit + hot-reload), never touches a
  # remote. Turn on only for a trusted multi-node mesh that shares one repo.
  git_remote_sync: false
  # If a boot that FOLLOWED an evolution reload fails its self-test, hard-reset
  # to the last known-good commit and relaunch on clean code. A failing COLD
  # boot is never reverted (likely environment, not a bad evolution).
  auto_revert_on_bad_boot: true

# ── Emotion ──
emotion:
  decay_rate: 0.05
  baseline:
    engagement: 0.5
    confidence: 0.6
    curiosity: 0.7
    concern: 0.2

# ── Content Safety ──
content_safety:
  enabled: true
  blocked_keywords: []       # regex patterns that block messages
  warning_keywords: []       # regex patterns that log warnings
  filter_output: true        # also check LLM responses

# ── Tools ──
tools:
  safety:
    max_risk_level: 3
    require_confirm_level: 3

# ── Skills ──
skills:
  extra_dirs: []

# ── Sessions ──
sessions:
  max_sessions: 50
  ttl_s: 3600        # 1 hour inactivity timeout

# ── Idle Scheduler ──
idle_scheduler:
  enabled: true
  max_concurrent_tasks: 2
  weights:
    user_activity: 0.3       # reduced from 0.5 — don't suppress Eva just because user is active
    system_load: 0.4         # increased — system load matters more
    queue_depth: 0.3         # increased — empty queue = Eva should work
  thresholds:
    busy: 0.0
    light: 0.15              # was 0.3 — enter light sooner (almost always active)
    moderate: 0.35            # was 0.6 — enter moderate much sooner
    deep: 0.6                # was 0.8 — enter deep at 60% idle (was 80%)
  budget:
    busy: 0.0
    light: 1.0               # was 0.5 — more budget in light
    moderate: 2.0             # was 1.0 — double budget in moderate
    deep: 5.0                # was 2.0 — full budget in deep
  user_activity:
    use_system_api: true
  env_scan:
    enabled: true
    batch_size: 500
    layer1_on_startup: true
    extra_high_value_dirs: []
    extra_skip_dirs: []

# ── Network ──
# Peers, secrets, remote_nodes are in local/env.yaml
network:
  enabled: true
  listen_port: 9420
  secret: ""
  peers: []
  gossip_interval_s: 5
  suspect_phi: 8
  dead_phi: 16
  remote_nodes: []

# ── Channels ──
channels:
  discord:
    enabled: false      # Enable in local/env.yaml
    token: ""           # Set via DISCORD_BOT_TOKEN env var
    allowed_users: []
  telegram:
    enabled: false      # Enable in local/env.yaml
    token: ""           # Set via TELEGRAM_BOT_TOKEN env var
    allowed_users: []   # Telegram user IDs (integers)
  webhook:
    enabled: false
    port: 9421
    secret: ""

# ── Dashboard ──
dashboard:
  port: 8420
  auto_open: false          # silent startup; true → open a browser tab on `python -m anima`
  auth:
    # password = the login secret typed at /v1/auth/login. BLANK = auth DISABLED
    # (every endpoint open) — set it in local/env.yaml to require login. Gates the
    # whole surface (/v1, /api, /ws) via the auth middleware.
    password: ""
    # token = HMAC secret used to SIGN session JWTs. Set a stable random string in
    # local/env.yaml so issued tokens survive restarts (blank = random per-process).
    token: ""
  # Built Vue SPA dir to serve. Blank → source-tree eva-ui/dist (dev); else API-only.
  ui_dist: ""
  cors:
    # Cross-origin browser clients allowed to call the API (e.g. a standalone
    # frontend on another host). Same-origin (SPA served here) needs nothing.
    allow_origins: ["http://localhost:5173", "http://127.0.0.1:5173"]
    allow_all: false   # dev convenience: reflect ANY origin. Keep false in prod.

voice_bridge:
  enabled: true
  host: "0.0.0.0"
  port: 9000
  tts:
    voice: "zh-CN-XiaoxiaoNeural"
    rate: "+5%"
    pitch: "+5Hz"
  stt:
    model_size: "base"

# ── Governance ──
governance:
  default_mode: "active"       # active / cautious / minimal
  # active:   full autonomy — normal heartbeat, self-thinking, evolution
  # cautious: reduced — LLM heartbeat min 10min, evolution disabled
  # minimal:  passive — self-thinking disabled, evolution disabled, heartbeat 30min

# ── System ──
shutdown:
  timeout_s: 5

logging:
  level: "INFO"
  file: "data/logs/anima.log"
  json_file: false          # JSON format for file handler (structured logging)

# ── MCP (Model Context Protocol) Servers ──
# External tool servers connected via MCP stdio transport.
# Each server is spawned as a subprocess on startup.
# Tools are auto-discovered and registered into ANIMA's tool system.
#
# Format:
#   mcp_servers:
#     <server_name>:
#       command: "npx"               # executable to run
#       args: ["-y", "@modelcontextprotocol/server-filesystem", "/data"]
#       env:                          # optional env vars (null = safe defaults)
#         GITHUB_TOKEN: "${GITHUB_TOKEN}"  # ${VAR} resolved from os.environ
#       cwd: null                     # optional working directory
#       enabled: true
#
# Tool names in ANIMA: mcp_<server_name>_<tool_name>
# Install MCP SDK: pip install mcp
#
mcp_servers: {}   # No MCP servers by default — configure in local/env.yaml

# ── Robotics / Embodied Nodes ──
# Configure PiDog-backed Linux nodes in local/env.yaml.
robotics:
  enabled: false
  poll_interval_s: 2.0
  nlp_supervisor:
    enabled: true
    model: "codex/gpt-5.3-codex"
    max_tokens: 480
    min_confidence: 0.55
  nodes: []
  exploration:
    tick_interval_s: 2.0
    move_burst_s: 1.2
    turn_burst_s: 0.85
    scan_pause_s: 0.35
    avoid_distance_cm: 32.0
    critical_battery_v: 6.0
    low_battery_v: 6.4
    walk_speed: 45
    turn_speed: 55
