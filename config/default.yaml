# ═══════════════════════════════════════
# ANIMA Default Configuration
# ═══════════════════════════════════════
#
# Project defaults only. No machine-specific values.
# Machine-specific settings go in local/env.yaml (gitignored).
# Secrets go in .env (gitignored).

agent:
  name: "eva"

# ── Heartbeat ──
heartbeat:
  script_interval_s: 30
  llm_interval_s: 600
  major_interval_s: 1800

llm_trigger:
  min_significant_diffs: 5
  significance_threshold: 0.5
  max_consecutive_skips: 10

# ── Perception ──
diff_rules:
  cpu_percent: { threshold: 15 }
  memory_percent: { threshold: 10 }
  disk_percent: { threshold: 5 }
  file_changes: { threshold: 0 }
  process_count: { threshold: 5 }

perception:
  watch_paths: ["."]
  watch_extensions: [".py", ".md", ".yaml", ".yml", ".json", ".txt"]
  snapshot_history_size: 10

# ── LLM ──
llm:
  tier1: { model: "claude-opus-4-6", max_tokens: 8192 }
  tier2: { model: "claude-sonnet-4-6", max_tokens: 4096 }
  budget: { daily_limit_usd: 10.0 }

decision:
  low_threshold: 0.3
  high_threshold: 0.7

# ── Memory ──
memory:
  working_capacity: 20
  db_path: "data/anima.db"

# ── Emotion ──
emotion:
  decay_rate: 0.05
  baseline:
    engagement: 0.5
    confidence: 0.6
    curiosity: 0.7
    concern: 0.2

# ── Tools ──
tools:
  safety:
    max_risk_level: 3
    require_confirm_level: 3

# ── Skills ──
skills:
  extra_dirs: []

# ── Network ──
# Peers, secrets, remote_nodes are in local/env.yaml
network:
  enabled: true
  listen_port: 9420
  secret: ""
  peers: []
  gossip_interval_s: 5
  suspect_phi: 8
  dead_phi: 16
  remote_nodes: []

# ── Channels ──
channels:
  discord:
    enabled: false      # Enable in local/env.yaml
    token: ""           # Set via DISCORD_BOT_TOKEN env var
    allowed_users: []
  webhook:
    enabled: false
    port: 9421
    secret: ""

# ── Dashboard ──
dashboard:
  port: 8420

# ── System ──
shutdown:
  timeout_s: 5

logging:
  level: "INFO"
  file: "data/logs/anima.log"
