name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  # ── Stage 1: Lint ──
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linters
        run: pip install ruff bandit

      - name: Ruff check
        run: ruff check anima/ --select E,F,W --ignore E501,W291,W292,W293

      - name: Bandit security scan
        run: bandit -r anima/ -ll -q || true

  # ── Stage 2: Syntax check ──
  syntax:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compile check all Python files
        run: find anima/ -name "*.py" -exec python -m py_compile {} \;

  # ── Stage 3: Tests ──
  test:
    runs-on: ubuntu-latest
    needs: syntax
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pytest-timeout

      - name: Unit tests
        run: |
          python -m pytest tests/ \
            --ignore=tests/stress_test.py \
            --ignore=tests/test_oauth_live.py \
            --ignore=tests/test_full_system.py \
            --ignore=tests/test_integration_network.py \
            -q --tb=short --timeout=30

      - name: Integration tests
        run: |
          python -m pytest tests/test_integration_pipeline.py \
            -q --tb=short --timeout=60

  # ── Stage 4: Security ──
  security:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          pip install pip-audit

      - name: Dependency audit
        run: pip-audit || true
