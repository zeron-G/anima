name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install ruff bandit
      # High-signal, low-noise: syntax errors + undefined names + bad statements.
      # (Style rules like E702 are intentionally NOT enforced — see code conventions.)
      - name: Ruff (real-bug subset)
        run: ruff check --select E9,F63,F7,F82 anima/ tests/
      - name: Compile check
        run: python -m compileall -q anima/
      - name: Bandit security scan (advisory)
        run: bandit -r anima/ -ll -q || true

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      # Slim core + dev tools + [network] (gossip mesh tests need pyzmq/zeroconf/
      # msgpack/paramiko). [tts]/[stt]/[discord] are skipped: those subsystems
      # lazy-import their heavy deps and the tests mock them, so the suite is green
      # without torch/faster-whisper/discord.
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,network]"
      - name: Tests
        run: pytest -q --ignore=tests/test_oauth_live.py
