# ANIMA same-origin reverse proxy (DEPLOYMENT.md Recipe A) for Cloudflare orange-cloud.
# nginx serves the built SPA and proxies API/WS to the local backend on :8420.
# TLS uses a Cloudflare Origin Certificate (SSL mode = Full (Strict)).
# __ANIMA_DIR__ is replaced by bootstrap.sh.

# Trust Cloudflare so the backend sees the real client IP (login rate-limit, logs).
# Refresh ranges from https://www.cloudflare.com/ips-v4 ; add ips-v6 if used.
# (Listed inline to keep this file self-contained.)
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 103.31.4.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 131.0.72.0/22;
real_ip_header CF-Connecting-IP;

server {
  listen 443 ssl http2;                # combined form: works on nginx 1.18 (Ubuntu 22.04) and 1.25+
  server_name _;                       # single-purpose box behind Cloudflare

  ssl_certificate     /etc/ssl/cloudflare/origin.pem;
  ssl_certificate_key /etc/ssl/cloudflare/origin.key;
  ssl_protocols TLSv1.2 TLSv1.3;

  client_max_body_size 25m;            # document/import uploads
  root __ANIMA_DIR__/eva-ui/dist;
  index index.html;

  # SPA client-side routing — anything not a real file → index.html
  location / { try_files $uri /index.html; }

  # REST + static API surface → backend
  location ~ ^/(v1|api|static|desktop)/ {
    proxy_pass http://127.0.0.1:8420;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_buffering off;               # so SSE /v1/chat/stream flushes immediately
    proxy_read_timeout 130s;           # > backend SSE 120s queue timeout
  }

  # WebSocket
  location /ws {
    proxy_pass http://127.0.0.1:8420;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_read_timeout 3600s;          # long-lived socket
  }
}
