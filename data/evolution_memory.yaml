anti_patterns:
- 不要用 display:none 切换 canvas — 用 z-index
- three-vrm v3 的 lookAt 没有 .target 属性 — 用 .lookAt(vec3)
- 不要在 Python raw string 里写大段 JS
- 不要用 top-level await import — 会阻塞模块加载链
- 骨骼重置时跳过 hips — 否则会清掉 rotateVRM0 旋转
- 不要在 config 里写明文密码 — 用 local/env.yaml 或 .env
- 不要硬编码路径 — 用 project_root() 或 sys.executable
- shell 命令在 Windows 上用 cmd 语法不是 bash
- createMediaElementSource 只能对每个 Audio 元素调用一次
- TTS 引擎是 Qwen3-TTS Base + voice clone — 不是 edge-tts 或 CosyVoice
- spawn_agent 后必须有超时检查和用户反馈 — 不能静默卡死
- 用户消息必须在合理时间内得到回复 — 即使是中间状态也要告知
